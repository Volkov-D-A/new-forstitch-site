services:
  postgres:
    image: postgres:16-alpine
    container_name: forstitch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: forstitch
      POSTGRES_USER: forstitch
      POSTGRES_PASSWORD: forstitch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forstitch -d forstitch"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    container_name: forstitch-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: forstitch
      MINIO_ROOT_PASSWORD: forstitch-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 forstitch forstitch-secret &&
      mc mb --ignore-existing local/forstitch
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: forstitch-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data:
