services:
  postgres:
    image: postgres:16-alpine
    container_name: forstitch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: forstitch
      POSTGRES_USER: forstitch
      POSTGRES_PASSWORD: forstitch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forstitch -d forstitch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
