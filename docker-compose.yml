services:
  postgres:
    image: ${POSTGRES_IMAGE}:${POSTGRES_IMAGE_VERSION}
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  minio:
    image: ${MINIO_IMAGE}:${MINIO_IMAGE_VERSION}
    container_name: ${MINIO_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    command: server /data --console-address ":${MINIO_CONSOLE_INTERNAL_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:${MINIO_API_INTERNAL_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_INTERNAL_PORT}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MINIO_API_INTERNAL_PORT}/minio/health/live"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  minio-init:
    image: ${MINIO_MC_IMAGE}:${MINIO_MC_IMAGE_VERSION}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:${MINIO_API_INTERNAL_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${MINIO_BUCKET}
      "

  mailpit:
    image: ${MAILPIT_IMAGE}:${MAILPIT_IMAGE_VERSION}
    container_name: ${MAILPIT_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    ports:
      - "${MAILPIT_SMTP_PORT}:${MAILPIT_SMTP_INTERNAL_PORT}"
      - "${MAILPIT_WEB_PORT}:${MAILPIT_WEB_INTERNAL_PORT}"

volumes:
  postgres_data:
  minio_data:
